# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = alembic

# template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date
# timezone = UTC

# max length of characters to prepend to syntax
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autocommit
# revision_environment = false

# set to 'true' to allow alembic to generate
# empty migrations that still check for updates
# write_hooks = 

sqlalchemy.url = postgresql+asyncpg://postgres:password_to_change_in_prod@db:5432/tallyko_shared

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
