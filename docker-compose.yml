version: '3.8'

services:
  proxy:
    image: traefik:v2.10
    container_name: tallyko-proxy
    command:
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - tallyko_net
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tallyko-backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:password_to_change_in_prod@db:5432/tallyko_shared
      - REDIS_URL=redis://cache:6379/0
      - MINIO_ENDPOINT=storage:9000
    depends_on:
      - db
      - cache
    networks:
      - tallyko_net

  db:
    image: postgres:15-alpine
    container_name: tallyko-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password_to_change_in_prod
      POSTGRES_DB: tallyko_shared
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - tallyko_net

  cache:
    image: redis:7-alpine
    container_name: tallyko-cache
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - tallyko_net

  storage:
    image: minio/minio:RELEASE.2023-10-25T06-33-25Z
    container_name: tallyko-storage
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password_to_change
    volumes:
      - minio_data:/data
    networks:
      - tallyko_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tallyko-frontend
    ports:
      - "8081:8081"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - tallyko_net
    environment:
      - CHOKIDAR_USEPOLLING=true

networks:
  tallyko_net:
    driver: bridge

volumes:
  pg_data:
  redis_data:
  minio_data:
